<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ACT-BizCard 業務戰情中心</title>
  <!-- 核心元件載入 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .loader { border-top-color: #3b82f6; animation: spinner 1s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .page-node { display: none; }
    .page-node.active { display: block; }
    /* LINE OA 風格滾動條 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
    .mock-phone { width: 320px; height: 600px; border: 12px solid #1E293B; border-radius: 3rem; overflow-y: auto; background: #fff; }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">

  <div id="app" class="min-h-screen flex flex-col md:flex-row">
    
    <!-- 1. PC 側邊欄 (LINE OA Style) -->
    <aside id="sidebar" class="hidden md:flex w-64 bg-slate-900 text-white flex-col sticky top-0 h-screen shrink-0 z-30">
      <div class="p-6 border-b border-slate-800">
        <h1 class="text-xl font-black tracking-tighter">ACT-BizCard <span class="text-blue-500 text-sm">PRO</span></h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase mt-1 tracking-widest">Master Dashboard</p>
      </div>
      
      <nav class="flex-1 p-4 space-y-2 mt-4">
        <button onclick="showPage('home')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-all font-bold text-sm">🏠 戰情首頁</button>
        <button onclick="showPage('scanner')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-all font-bold text-sm">📸 AI 名片採集</button>
        <button onclick="showPage('editor')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-800 transition-all font-bold text-sm">🎨 V3 戰報發布</button>
        <div id="sidebar-admin-area" class="hidden pt-6 mt-6 border-t border-slate-800">
           <p class="px-3 text-[10px] font-black text-slate-500 mb-2 uppercase">管理員專區</p>
           <button onclick="alert('全域數據加載中...')" class="w-full flex items-center gap-3 p-3 rounded-xl bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 transition-all font-bold text-sm">📊 數據中心</button>
        </div>
      </nav>

      <div class="p-6 bg-slate-950/50 flex items-center gap-3">
         <img src="" id="sidebar-avatar" class="w-8 h-8 rounded-full border border-slate-700 bg-slate-800">
         <div class="overflow-hidden">
            <p id="sidebar-name" class="text-xs font-black truncate">Tonyfang</p>
            <p class="text-[9px] text-slate-500 font-bold uppercase">Online</p>
         </div>
      </div>
    </aside>

    <!-- 2. 手機版標頭 (僅手機可見) -->
    <header class="md:hidden p-4 border-b bg-white flex justify-between items-center sticky top-0 z-40 shadow-sm">
      <div onclick="showPage('home')" class="flex items-center gap-2">
        <h1 class="text-lg font-black text-slate-800 tracking-tight">ACT-BizCard <span class="text-blue-600">AI</span></h1>
        <span id="mobile-admin-badge" class="hidden px-2 py-0.5 bg-amber-100 text-amber-600 text-[9px] font-black rounded">ADMIN</span>
      </div>
      <img src="" id="mobile-avatar" class="w-8 h-8 rounded-full border border-slate-200">
    </header>

    <!-- 3. 主要工作區域 -->
    <main class="flex-1 flex flex-col min-w-0">
      
      <!-- 頁面：導覽首頁 (PC 下改為數據面板) -->
      <div id="page-home" class="page-node active p-4 md:p-10 space-y-6">
        <div id="hero-card" class="bg-gradient-to-br from-slate-800 to-slate-900 p-8 md:p-12 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden">
          <div class="relative z-10 max-w-xl">
            <h2 class="text-3xl md:text-4xl font-black mb-2">您好，<span id="welcome-name">Tonyfang</span></h2>
            <p class="text-slate-400 text-sm md:text-base font-medium opacity-80 leading-relaxed">
              歡迎回到業務戰情中心。目前系統已有 30 位業務人員進駐，您可以在此管理全域數據或發布最新的 V3 內容。
            </p>
          </div>
          <div class="absolute -right-8 -bottom-8 text-[12rem] opacity-5 rotate-12 pointer-events-none">🚀</div>
        </div>

        <!-- 快速功能區 (僅手機版顯眼的卡片) -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <button onclick="showPage('scanner')" class="flex items-center gap-6 p-6 md:p-8 bg-white border border-slate-200 rounded-[2rem] hover:border-blue-500 hover:shadow-lg transition-all text-left group">
            <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center text-4xl group-hover:scale-110 transition-transform">📸</div>
            <div>
              <h3 class="font-black text-slate-800 text-lg">AI 名片採集</h3>
              <p class="text-xs text-slate-400 font-bold mt-1 uppercase tracking-tighter">Business Card OCR</p>
            </div>
          </button>

          <button onclick="showPage('editor')" class="flex items-center gap-6 p-6 md:p-8 bg-white border border-slate-200 rounded-[2rem] hover:border-green-500 hover:shadow-lg transition-all text-left group">
            <div class="w-16 h-16 bg-green-50 rounded-2xl flex items-center justify-center text-4xl group-hover:scale-110 transition-transform">🎨</div>
            <div>
              <h3 class="font-black text-slate-800 text-lg">V3 戰報發布</h3>
              <p class="text-xs text-slate-400 font-bold mt-1 uppercase tracking-tighter">Content Manager</p>
            </div>
          </button>

          <div id="btn-admin-only" class="hidden md:flex flex-col justify-center p-8 bg-blue-600 rounded-[2.5rem] text-white shadow-xl shadow-blue-100">
             <h4 class="text-2xl font-black italic">382</h4>
             <p class="text-xs font-bold opacity-70 uppercase tracking-widest mt-1">本月總採集名片數</p>
          </div>
        </div>
      </div>

      <!-- 頁面：AI 掃描器 (維持手機感) -->
      <div id="page-scanner" class="page-node p-4 md:p-10">
        <div class="max-w-xl mx-auto space-y-6">
          <div id="step-capture" class="space-y-6">
            <div class="aspect-[1.58/1] w-full border-4 border-dashed border-slate-200 rounded-[3rem] flex flex-col items-center justify-center bg-white relative overflow-hidden group cursor-pointer">
              <input type="file" id="cameraInput" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 z-10 cursor-pointer" onchange="handleFile(this)">
              <div class="text-center group-hover:scale-110 transition-transform duration-300">
                <div class="text-6xl mb-4">📸</div>
                <p class="text-base font-black text-slate-600 uppercase tracking-tight">拍攝名片影像</p>
              </div>
            </div>
          </div>

          <div id="step-review" class="hidden space-y-4 bg-white p-8 rounded-[2.5rem] border border-slate-100 shadow-sm animate-in slide-in-from-bottom duration-500">
            <div class="grid grid-cols-2 gap-4">
              <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">姓名</label><input type="text" id="res-name" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:border-blue-500 outline-none"></div>
              <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">電話</label><input type="text" id="res-phone" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:border-blue-500 outline-none"></div>
            </div>
            <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">公司</label><input type="text" id="res-company" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:border-blue-500 outline-none"></div>
            <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">職稱</label><input type="text" id="res-title" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:border-blue-500 outline-none"></div>
            <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">Email</label><input type="text" id="res-email" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold focus:border-blue-500 outline-none"></div>
            <div class="space-y-1"><label class="text-[10px] font-black text-slate-400 uppercase">地址</label><textarea id="res-address" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-sm font-bold h-20 resize-none focus:border-blue-500 outline-none"></textarea></div>
            <button onclick="saveCard()" class="w-full bg-blue-600 text-white p-5 rounded-3xl font-black text-lg shadow-xl shadow-blue-100 active:scale-95 transition-transform mt-4">確認存檔並歸屬</button>
          </div>
        </div>
      </div>

      <!-- 頁面：V3 編輯器 (PC 專屬雙欄畫面) -->
      <div id="page-editor" class="page-node p-4 md:p-10 overflow-hidden h-full">
        <div class="flex flex-col lg:flex-row gap-10 h-full">
          
          <!-- 左側：手機模擬預覽 (PC 顯示) -->
          <div class="hidden lg:flex flex-col items-center shrink-0">
             <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4">Mobile Live Preview</p>
             <div class="mock-phone shadow-2xl no-scrollbar flex flex-col relative">
                <!-- Flex 模擬內容 -->
                <img id="v3-mock-hero" src="https://it-ares.com/wp-content/uploads/2024/05/ares-logo.png" class="w-full aspect-[12/5] object-cover">
                <div id="v3-mock-body" class="flex-1 p-0 flex flex-col">
                   <!-- 動態填充 -->
                </div>
                <div class="p-4 border-t border-slate-100 flex justify-center gap-4 bg-slate-50">
                   <div class="w-5 h-5 rounded-full bg-slate-300"></div>
                   <div class="w-5 h-5 rounded-full bg-slate-300"></div>
                   <div class="w-5 h-5 rounded-full bg-slate-300"></div>
                </div>
             </div>
          </div>

          <!-- 右側：編輯表單 -->
          <div class="flex-1 space-y-6 overflow-y-auto no-scrollbar pb-20">
             <div class="flex items-center justify-between mb-2">
                <h2 class="text-2xl font-black text-slate-800">戰報內容編輯器</h2>
                <div class="flex gap-2">
                   <input type="color" id="v3-theme-color" value="#0056b3" class="w-10 h-10 cursor-pointer" onchange="renderV3Mock()">
                   <input type="color" id="v3-text-color" value="#ffffff" class="w-10 h-10 cursor-pointer" onchange="renderV3Mock()">
                </div>
             </div>

             <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 space-y-6">
                <div class="space-y-1">
                   <label class="text-[10px] font-black text-slate-400 uppercase ml-1">品牌主視覺 URL</label>
                   <input type="text" id="v3-hero-url" value="https://it-ares.com/wp-content/uploads/2024/05/ares-logo.png" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold focus:border-green-400 outline-none" oninput="renderV3Mock()">
                </div>
                
                <div id="v3-items-container" class="space-y-4">
                   <!-- 項目列表 -->
                </div>

                <button onclick="addV3Item()" class="w-full py-6 border-2 border-dashed border-slate-200 rounded-[2rem] text-slate-400 font-black text-xs hover:border-green-400 hover:text-green-500 transition-all uppercase tracking-widest">
                   ＋ 新增一個戰報欄位
                </button>

                <div class="pt-6">
                   <button onclick="saveV3Content()" class="w-full bg-green-600 text-white p-6 rounded-3xl font-black text-lg shadow-xl shadow-green-100 active:scale-95 transition-all uppercase">
                      立即發布至 LINE OA 戰情室
                   </button>
                </div>
             </div>
          </div>

        </div>
      </div>

    </main>

    <!-- 裁切視窗 -->
    <div id="step-crop" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
      <div class="p-6 flex justify-between items-center bg-black/80 backdrop-blur text-white">
        <button onclick="cancelCrop()" class="px-4 py-2 font-bold text-sm opacity-70">取消</button>
        <span class="font-black text-sm tracking-widest uppercase">裁切區域優化</span>
        <button onclick="confirmCrop()" class="px-8 py-2 bg-blue-600 rounded-full font-bold text-sm shadow-lg">開始 AI 辨識</button>
      </div>
      <div class="flex-1 relative flex items-center justify-center overflow-hidden"><img id="cropTarget" class="max-w-full"></div>
    </div>

    <!-- 載入中遮罩 -->
    <div id="loading" class="hidden fixed inset-0 z-[100] bg-white/95 backdrop-blur-md flex flex-col items-center justify-center p-12 text-center">
      <div class="loader rounded-full border-4 border-t-4 border-slate-100 h-20 w-20 mb-8 shadow-inner"></div>
      <h3 class="text-xl font-black text-slate-800" id="loading-text">處理中...</h3>
      <p class="text-[10px] text-slate-400 font-black mt-2 tracking-[0.3em] uppercase">Business Intelligence Engine</p>
    </div>

  </div>

  <script>
    const CONFIG = {
      LIFF_ID: "2009367829-zVxIwsKl",
      WORKER_URL: "https://super-snow-506c.ares-co2026.workers.dev/",
      LICENSE_KEY: "ARES-PRO-2024-KEY",
      ADMIN_UID: "Uf729764dbb5b652a5a90a467320bea29" 
    };

    let currentEmpName = "系統管理員";
    let isAdmin = false;
    let cropper = null;
    let croppedBase64 = null;
    
    // V3 預設內容
    let v3Items = [
      { title: "【最新認證】2024 年度資安轉版工作開始", data: "ares_01", img: "https://images.unsplash.com/photo-1554224155-1696413565d3?w=400", btn: "查看" },
      { title: "【專業課程】碳權實務抵換班報名中", data: "ares_02", img: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=400", btn: "預約" }
    ];

    async function initLiff() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
        } else {
          const profile = await liff.getProfile();
          const uid = liff.getContext().userId;
          currentEmpName = profile.displayName;
          isAdmin = (uid === CONFIG.ADMIN_UID);

          // 更新所有介面身分
          updateIdentityUI(profile);
        }
      } catch (err) {
        console.error("Liff Init Failed", err);
        updateIdentityUI({ displayName: "Developer Mode", pictureUrl: "" });
      }
      renderV3List();
    }

    function updateIdentityUI(profile) {
      const names = document.querySelectorAll('#welcome-name, #sidebar-name');
      names.forEach(n => n.innerText = currentEmpName);
      
      const avatars = document.querySelectorAll('#mobile-avatar, #sidebar-avatar');
      avatars.forEach(a => { if(profile.pictureUrl) a.src = profile.pictureUrl; });

      if (isAdmin) {
        document.getElementById('mobile-admin-badge').classList.remove('hidden');
        document.getElementById('sidebar-admin-area').classList.remove('hidden');
        document.getElementById('btn-admin-only').classList.remove('hidden');
        document.getElementById('hero-card').className = "bg-gradient-to-br from-blue-600 to-indigo-900 p-8 md:p-12 rounded-[2.5rem] text-white shadow-xl relative overflow-hidden admin-glow";
      }
    }

    function showPage(pageId) {
      document.querySelectorAll('.page-node').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + pageId).classList.add('active');
      window.scrollTo(0, 0);
      if(pageId === 'editor') renderV3Mock();
    }

    // --- V3 編輯功能 ---
    function renderV3List() {
      const container = document.getElementById('v3-items-container');
      container.innerHTML = '';
      v3Items.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = "flex gap-5 p-6 bg-slate-50 border border-slate-100 rounded-3xl items-center relative animate-in fade-in slide-in-from-right duration-300";
        div.innerHTML = `
          <div class="w-20 h-20 bg-white rounded-2xl overflow-hidden shrink-0 border border-slate-200 shadow-sm">
            <img src="${item.img}" class="w-full h-full object-cover">
          </div>
          <div class="flex-1 space-y-3">
            <input type="text" value="${item.title}" oninput="v3Items[${idx}].title=this.value;renderV3Mock()" class="w-full text-sm font-black text-slate-800 bg-transparent outline-none border-b border-slate-200 focus:border-green-400 pb-1">
            <div class="grid grid-cols-2 gap-4">
               <div class="flex items-center gap-2">
                 <span class="text-[8px] font-black text-slate-400 uppercase tracking-tighter">Data ID:</span>
                 <input type="text" value="${item.data}" oninput="v3Items[${idx}].data=this.value;renderV3Mock()" class="flex-1 text-[10px] font-bold text-slate-500 bg-transparent outline-none border-b border-slate-100">
               </div>
               <div class="flex items-center gap-2">
                 <span class="text-[8px] font-black text-slate-400 uppercase tracking-tighter">Btn:</span>
                 <input type="text" value="${item.btn}" oninput="v3Items[${idx}].btn=this.value;renderV3Mock()" class="flex-1 text-[10px] font-bold text-slate-500 bg-transparent outline-none border-b border-slate-100">
               </div>
            </div>
          </div>
          <button onclick="v3Items.splice(${idx},1);renderV3List();renderV3Mock()" class="w-10 h-10 flex items-center justify-center text-slate-300 hover:text-red-500 transition-colors">✕</button>
        `;
        container.appendChild(div);
      });
      renderV3Mock();
    }

    function renderV3Mock() {
      const hero = document.getElementById('v3-hero-url').value;
      const theme = document.getElementById('v3-theme-color').value;
      const text = document.getElementById('v3-text-color').value;
      
      document.getElementById('v3-mock-hero').src = hero;
      const mockBody = document.getElementById('v3-mock-body');
      mockBody.innerHTML = '';
      
      v3Items.forEach(item => {
        const d = document.createElement('div');
        d.className = "flex items-center gap-3 p-3 border-b border-slate-100";
        d.innerHTML = `
          <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">
          <div class="flex-1 truncate">
            <p class="text-[11px] font-black text-slate-800 truncate">${item.title}</p>
            <p class="text-[9px] text-red-500 font-black mt-1 uppercase tracking-tighter">Hot Now</p>
          </div>
          <div style="background:${theme}; color:${text}" class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-black shrink-0 shadow-sm">${item.btn}</div>
        `;
        mockBody.appendChild(d);
      });
    }

    function addV3Item() {
      if (v3Items.length >= 8) return alert("最高支援 8 筆");
      v3Items.push({ title: "新戰報標題...", data: "new_" + Date.now(), img: "https://aiwe.cc/wp-content/uploads/2026/02/87e6f8054bd3672f2885e38bddb112e2.png", btn: "查看" });
      renderV3List();
    }

    async function saveV3Content() {
      const v3Data = {
        hero: document.getElementById('v3-hero-url').value,
        theme: document.getElementById('v3-theme-color').value,
        text: document.getElementById('v3-text-color').value,
        items: v3Items
      };
      showLoading("發布戰報中...");
      try {
        await fetch(CONFIG.WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "saveV3", empName: currentEmpName, data: v3Data })
        });
        hideLoading();
        alert("✅ V3 戰報已同步至全系統！");
        showPage('home');
      } catch (e) { hideLoading(); alert("發布異常"); }
    }

    // --- 掃描邏輯 ---
    function handleFile(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          const img = document.getElementById('cropTarget');
          img.src = e.target.result;
          document.getElementById('step-crop').classList.remove('hidden');
          if (cropper) cropper.destroy();
          cropper = new Cropper(img, { aspectRatio: 1.58 / 1, viewMode: 1 });
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function cancelCrop() { document.getElementById('step-crop').classList.add('hidden'); }
    function confirmCrop() {
      croppedBase64 = cropper.getCroppedCanvas({ width: 800 }).toDataURL('image/jpeg', 0.85);
      document.getElementById('step-crop').classList.add('hidden');
      processWithAI();
    }

    async function processWithAI() {
      showLoading("AI 深度掃描中...");
      try {
        const response = await fetch(CONFIG.WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "analyze", image: croppedBase64.split(',')[1] })
        });
        const r = await response.json();
        hideLoading();
        if (r.success) {
          const d = r.data;
          document.getElementById('res-name').value = d.name || '';
          document.getElementById('res-phone').value = d.phone || '';
          document.getElementById('res-company').value = d.company || '';
          document.getElementById('res-title').value = d.title || '';
          document.getElementById('res-email').value = d.email || '';
          document.getElementById('res-address').value = d.address || '';
          document.getElementById('step-review').classList.remove('hidden');
        }
      } catch (err) { hideLoading(); alert("辨識失敗"); }
    }

    async function saveCard() {
      const cardData = {
        name: document.getElementById('res-name').value,
        company: document.getElementById('res-company').value,
        title: document.getElementById('res-title').value,
        phone: document.getElementById('res-phone').value,
        email: document.getElementById('res-email').value,
        address: document.getElementById('res-address').value,
        imgBase64: croppedBase64
      };
      showLoading("正在歸屬數據...");
      try {
        await fetch(CONFIG.WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "save", empName: currentEmpName, data: cardData })
        });
        hideLoading();
        alert("✅ 資料已成功入庫！");
        location.reload();
      } catch (e) { hideLoading(); alert("存檔失敗"); }
    }

    function showLoading(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading').classList.add('hidden'); }

    window.onload = initLiff;
  </script>
</body>
</html>
