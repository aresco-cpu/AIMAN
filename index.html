<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ACT-BizCard 名片採集器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

  <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative">
    
    <!-- Header -->
    <header class="p-6 border-bottom bg-white sticky top-0 z-20 shadow-sm">
      <h1 class="text-xl font-extrabold text-slate-800">ACT-BizCard <span class="text-blue-600">AI</span></h1>
      <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Business Card Collector v2.0</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-6 overflow-y-auto no-scrollbar pb-24">
      
      <!-- Step 1: Upload / Capture -->
      <div id="step-capture" class="space-y-6">
        <div class="aspect-[1.58/1] w-full border-4 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center bg-slate-50 relative overflow-hidden group">
          <input type="file" id="cameraInput" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer z-10" onchange="handleFile(this)">
          <div class="text-center group-hover:scale-110 transition-transform">
            <div class="text-4xl mb-2">📸</div>
            <p class="text-sm font-bold text-slate-500">拍攝名片或上傳照片</p>
          </div>
          <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden">
        </div>
        <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
          <p class="text-[11px] text-blue-700 leading-relaxed font-medium">提示：請確保名片在光線充足處拍攝，邊緣對齊方框，AI 辨識將更加精準。</p>
        </div>
      </div>

      <!-- Step 2: Cropping -->
      <div id="step-crop" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
        <div class="p-4 flex justify-between items-center bg-black/50 backdrop-blur text-white">
          <button onclick="cancelCrop()" class="px-4 py-2 font-bold text-sm">取消</button>
          <span class="font-bold">名片裁切優化</span>
          <button onclick="confirmCrop()" class="px-6 py-2 bg-blue-600 rounded-full font-bold text-sm shadow-lg">確認裁切</button>
        </div>
        <div class="flex-1 relative bg-slate-900">
          <img id="cropTarget" class="max-w-full">
        </div>
      </div>

      <!-- Step 3: Review / Edit -->
      <div id="step-review" class="hidden space-y-6">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
          <h2 class="font-bold text-slate-700">AI 辨識結果校對</h2>
        </div>
        
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase">姓名</label>
              <input type="text" id="res-name" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold">
            </div>
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase">電話</label>
              <input type="text" id="res-phone" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold">
            </div>
          </div>
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase">公司</label>
            <input type="text" id="res-company" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold">
          </div>
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase">職稱</label>
            <input type="text" id="res-title" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold">
          </div>
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase">Email</label>
            <input type="text" id="res-email" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold">
          </div>
          <div>
            <label class="text-[10px] font-black text-slate-400 uppercase">地址</label>
            <textarea id="res-address" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold h-20"></textarea>
          </div>
        </div>

        <button onclick="saveCard()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-200 active:scale-95 transition-all">確認無誤，建立名片</button>
        <button onclick="location.reload()" class="w-full text-slate-400 font-bold text-sm py-2">重新掃描</button>
      </div>

    </main>

    <!-- Loading Overlay -->
    <div id="loading" class="hidden fixed inset-0 z-[100] bg-white/90 backdrop-blur flex flex-col items-center justify-center p-10 text-center">
      <div class="loader ease-linear rounded-full border-4 border-t-4 border-slate-200 h-16 w-16 mb-4"></div>
      <h3 class="text-lg font-black text-slate-800" id="loading-text">AI 正在辨識名片中...</h3>
      <p class="text-sm text-slate-400 mt-2">這大約需要 3-5 秒的時間</p>
    </div>

  </div>

  <script>
    let cropper = null;
    let croppedBase64 = null;

    function handleFile(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('cropTarget').src = e.target.result;
          document.getElementById('step-crop').classList.remove('hidden');
          initCropper();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function initCropper() {
      if (cropper) cropper.destroy();
      const image = document.getElementById('cropTarget');
      cropper = new Cropper(image, {
        aspectRatio: 1.58 / 1,
        viewMode: 2,
        autoCropArea: 0.9,
        background: false
      });
    }

    function cancelCrop() {
      document.getElementById('step-crop').classList.add('hidden');
      document.getElementById('cameraInput').value = '';
    }

    function confirmCrop() {
      croppedBase64 = cropper.getCroppedCanvas({ width: 800 }).toDataURL('image/jpeg', 0.8);
      document.getElementById('step-crop').classList.add('hidden');
      processWithAI();
    }

    function processWithAI() {
      showLoading("AI 正在深度掃描名片內容...");
      
      google.script.run
        .withSuccessHandler(function(result) {
          hideLoading();
          if (result.success) {
            fillData(result.data);
            document.getElementById('step-capture').classList.add('hidden');
            document.getElementById('step-review').classList.remove('hidden');
          } else {
            alert("辨識失敗：" + result.error);
          }
        })
        .withFailureHandler(function(err) {
          hideLoading();
          alert("網路或伺服器錯誤");
        })
        .analyzeCardImage(croppedBase64);
    }

    function fillData(data) {
      document.getElementById('res-name').value = data.name || '';
      document.getElementById('res-company').value = data.company || '';
      document.getElementById('res-title').value = data.title || '';
      document.getElementById('res-phone').value = data.phone || '';
      document.getElementById('res-email').value = data.email || '';
      document.getElementById('res-address').value = data.address || '';
    }

    function saveCard() {
      const cardData = {
        name: document.getElementById('res-name').value,
        company: document.getElementById('res-company').value,
        title: document.getElementById('res-title').value,
        phone: document.getElementById('res-phone').value,
        email: document.getElementById('res-email').value,
        address: document.getElementById('res-address').value,
        imgBase64: croppedBase64
      };

      showLoading("正在儲存名片並通知管理員...");
      
      google.script.run
        .withSuccessHandler(function(res) {
          hideLoading();
          if (res.success) {
            alert("名片已成功建檔！");
            location.reload();
          } else {
            alert("儲存失敗：" + res.error);
          }
        })
        .saveCardToSheet(cardData);
    }

    function showLoading(text) {
      document.getElementById('loading-text').innerText = text;
      document.getElementById('loading').classList.remove('hidden');
    }

    function hideLoading() {
      document.getElementById('loading').classList.add('hidden');
    }
  </script>
</body>
</html>
