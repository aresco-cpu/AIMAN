<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ACT-BizCard 業務戰情中心</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root { --line-green: #06C755; --line-dark: #111111; --line-gray: #F4F5F9; --sidebar-width: 240px; }
    body { background-color: var(--line-gray); font-family: sans-serif; }
    .page-node { display: none; }
    .page-node.active { display: block; }
    .sidebar { width: var(--sidebar-width); background: var(--line-dark); color: #fff; height: 100vh; position: fixed; top: 0; left: 0; z-index: 50; }
    .sidebar-item { padding: 14px 24px; color: #999; cursor: pointer; font-size: 14px; border-left: 4px solid transparent; }
    .sidebar-item.active { background: #222; color: #fff; border-left-color: var(--line-green); }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #E2E8F0; height: 75px; display: flex; z-index: 60; }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; font-weight: 900; color: #1E293B; }
    .nav-btn.active { color: #E91E63; }
    .mock-bubble { border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); background: #fff; }
    #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #fff; padding: 12px 30px; border-radius: 50px; font-size: 13px; z-index: 2000; display: none; }
    body.is-preview .sidebar, body.is-preview .bottom-nav { display: none !important; }
  </style>
</head>
<body>

  <aside id="pc-sidebar" class="sidebar hidden md:flex flex-col">
    <div class="p-8"><h2 class="text-xl font-black text-white">戰情後台</h2></div>
    <nav class="flex-1">
      <div onclick="showPage('home')" class="sidebar-item active" data-page="home">數據概覽</div>
      <div onclick="showPage('scanner')" class="sidebar-item" data-page="scanner">名片採集</div>
      <div onclick="showPage('editor')" class="sidebar-item" data-page="editor">V3 內容發布</div>
    </nav>
    <div class="p-6 bg-[#0a0a0a] flex items-center gap-3">
      <img src="" id="pc-avatar" class="w-10 h-10 rounded-full bg-gray-800">
      <div class="overflow-hidden text-white"><p id="pc-name" class="text-sm font-bold truncate">Admin</p></div>
    </div>
  </aside>

  <main class="md:ml-[240px] p-4 md:p-10 transition-all duration-300">
    <div id="page-home" class="page-node active space-y-6">
      <div class="bg-white p-8 border rounded-xl shadow-sm"><h3 class="text-2xl font-bold">您好，<span id="welcome-name" class="text-green-600">Tonyfang</span></h3></div>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="bg-white p-8 border rounded-xl shadow-sm text-center"><p class="text-xs font-black text-gray-400">當月採集量</p><h4 class="text-5xl font-black mt-2">382</h4></div>
        <div onclick="showPage('scanner')" class="bg-white p-8 border rounded-xl shadow-sm cursor-pointer hover:border-green-500">📸 名片掃描</div>
        <div onclick="showPage('editor')" class="bg-white p-8 border rounded-xl shadow-sm cursor-pointer hover:border-green-500">🎨 V3 編輯</div>
      </div>
    </div>

    <div id="page-user-preview" class="page-node max-w-[380px] mx-auto pt-10">
      <div class="mock-bubble">
        <img id="v3-user-hero" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" class="w-full aspect-[12/5] object-cover">
        <div id="v3-user-body" class="bg-white"></div>
      </div>
      <div class="mt-10 text-center"><button onclick="toggleViewMode()" class="bg-black text-white px-8 py-3 rounded-full text-xs font-black">返回後台</button></div>
    </div>

    <div id="page-scanner" class="page-node max-w-2xl mx-auto">
      <div id="step-capture" class="bg-white p-12 border rounded-2xl text-center">
        <input type="file" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleFile(this)">
        <span class="text-5xl">📸</span><p class="mt-4 font-black text-gray-500">拍照或上傳</p>
      </div>
      <div id="step-review" class="hidden bg-white p-8 border rounded-2xl shadow-sm space-y-4">
        <input type="text" id="res-name" placeholder="姓名">
        <input type="text" id="res-phone" placeholder="電話">
        <button onclick="saveCard()" class="w-full bg-[#06C755] text-white py-4 rounded-xl font-black">確認存檔</button>
      </div>
    </div>

    <div id="page-editor" class="page-node">
      <div class="flex justify-between mb-8">
        <h2 class="text-2xl font-black">V3 戰報編輯器</h2>
        <button onclick="saveV3Content()" class="bg-[#06C755] text-white px-10 py-3 rounded-lg font-black">發布</button>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-[360px_1fr] gap-10">
        <div class="mock-bubble h-fit sticky top-10">
          <img id="v3-mock-hero" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" class="w-full aspect-[12/5] object-cover">
          <div id="v3-mock-body"></div>
        </div>
        <div class="space-y-6">
          <div class="bg-white p-6 border rounded-xl space-y-4">
            <label>頂部圖片</label>
            <div class="flex gap-2">
              <input type="text" id="v3-hero-url" placeholder="URL 或上傳">
              <button onclick="document.getElementById('hero-file').click()" class="bg-gray-100 px-4 rounded font-bold text-xs uppercase">Upload</button>
              <input type="file" id="hero-file" class="hidden" accept="image/*" onchange="handleV3Upload(this, 'hero')">
            </div>
            <div class="grid grid-cols-2 gap-4">
              <input type="color" id="v3-theme-color" value="#0056b3" oninput="renderV3()">
              <input type="color" id="v3-text-color" value="#ffffff" oninput="renderV3()">
            </div>
          </div>
          <div id="v3-items-list" class="space-y-4"></div>
          <button onclick="addV3Item()" class="w-full py-4 border-2 border-dashed rounded-xl font-bold">+ 新增項目</button>
        </div>
      </div>
    </div>
  </main>

  <nav id="bottom-nav" class="bottom-nav md:hidden">
    <div onclick="showToast('核銷')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4m-2 12v4a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2h11" stroke-linecap="round"/></svg><span>核銷</span></div>
    <div onclick="showPage('scanner')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8" stroke-linecap="round"/></svg><span>建立</span></div>
    <div onclick="showToast('CRM')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>CRM</span></div>
    <div id="btn-match" onclick="toggleViewMode()" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.5 14.5L12 12m0 0l2.5-2.5M12 12l2.5 2.5M12 12l-2.5-2.5M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9z" stroke-linecap="round"/></svg><span>配對</span></div>
    <div onclick="showToast('名片')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>名片</span></div>
    <div onclick="showPage('home')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33"/></svg><span>參數</span></div>
  </nav>

  <div id="loading" class="hidden fixed inset-0 z-[100] bg-white/90 flex flex-col items-center justify-center">
    <div class="w-12 h-12 border-4 border-t-green-500 rounded-full animate-spin"></div>
    <p id="loading-text" class="mt-4 font-bold">處理中...</p>
  </div>
  <div id="toast"></div>

  <script>
    const CONFIG = {
      LIFF_ID: "2009367829-zVxIwsKl",
      WORKER_URL: "https://super-snow-506c.ares-co2026.workers.dev/",
      LICENSE_KEY: "ARES-PRO-2024-KEY",
      ADMIN_UID: "Uf729764dbb5b652a5a90a467320bea29",
      V3_FOLDER_ID: "1ZXxjxglQqPpaLGV5tq4iIjqLqrfD7Zw1"
    };

    let currentEmpName = "Admin", isPreviewMode = false, croppedBase64 = null;
    let v3Items = [{ title: "範例戰報", data: "ares_01", img: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=", btn: "查看", link: "" }];

    async function initLiff() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        if (!liff.isLoggedIn()) liff.login();
        else {
          const p = await liff.getProfile();
          currentEmpName = p.displayName;
          document.getElementById('welcome-name').innerText = currentEmpName;
          document.getElementById('pc-name').innerText = currentEmpName;
          document.getElementById('pc-avatar').src = p.pictureUrl;
          document.getElementById('mobile-avatar').src = p.pictureUrl;
        }
      } catch (e) {}
      renderV3();
    }

    function toggleViewMode() { isPreviewMode = !isPreviewMode; applyViewMode(); }
    function applyViewMode() {
      const b = document.body;
      isPreviewMode ? b.classList.add('is-preview') : b.classList.remove('is-preview');
      showPage(isPreviewMode ? 'user-preview' : 'home');
      document.getElementById('btn-match').classList.toggle('active', isPreviewMode);
    }

    function showPage(pId) {
      document.querySelectorAll('.page-node').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + pId).classList.add('active');
      if (pId === 'user-preview') syncUserPreview();
    }

    function renderV3() {
      const container = document.getElementById('v3-items-list');
      const mockBody = document.getElementById('v3-mock-body');
      const theme = document.getElementById('v3-theme-color').value;
      const tCol = document.getElementById('v3-text-color').value;
      const hero = document.getElementById('v3-hero-url').value;
      if (hero.startsWith('http') || hero.startsWith('data:')) document.getElementById('v3-mock-hero').src = hero;
      
      container.innerHTML = ''; mockBody.innerHTML = '';
      v3Items.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = "bg-gray-50 border rounded-xl p-4 relative flex gap-4";
        div.innerHTML = `
          <div class="w-20 h-20 bg-white border rounded relative overflow-hidden shrink-0 group">
            <img src="${item.img}" class="w-full h-full object-cover">
            <div onclick="document.getElementById('f-${idx}').click()" class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center cursor-pointer text-[10px] text-white font-bold">上傳</div>
            <input type="file" id="f-${idx}" class="hidden" accept="image/*" onchange="handleV3Upload(this, ${idx})">
          </div>
          <div class="flex-1 space-y-2">
            <input type="text" value="${item.title}" class="font-bold text-sm" oninput="v3Items[${idx}].title=this.value;renderV3()">
            <div class="grid grid-cols-2 gap-2"><input type="text" value="${item.data}" class="text-[10px]" oninput="v3Items[${idx}].data=this.value;renderV3()"><input type="text" value="${item.btn}" class="text-[10px]" oninput="v3Items[${idx}].btn=this.value;renderV3()"></div>
          </div>
          <button onclick="v3Items.splice(${idx},1);renderV3()" class="text-gray-300">✕</button>`;
        container.appendChild(div);
        const mDiv = document.createElement('div');
        mDiv.className = "flex items-center gap-4 p-4 border-b border-gray-50";
        mDiv.innerHTML = `<img src="${item.img}" class="w-14 h-14 rounded-lg object-cover"><div class="flex-1 overflow-hidden"><p class="text-[12px] font-bold truncate">${item.title}</p><p class="text-[9px] text-green-500 font-black mt-1">RECOMMENDED</p></div><div style="background:${theme}; color:${tCol}" class="w-10 h-10 rounded-full flex items-center justify-center text-[10px] font-black shrink-0">${item.btn}</div>`;
        mockBody.appendChild(mDiv);
      });
    }

    function syncUserPreview() {
      const theme = document.getElementById('v3-theme-color').value;
      const tCol = document.getElementById('v3-text-color').value;
      document.getElementById('v3-user-hero').src = document.getElementById('v3-hero-url').value;
      const body = document.getElementById('v3-user-body');
      body.innerHTML = '';
      v3Items.forEach(item => {
        const d = document.createElement('div');
        d.className = "flex items-center gap-4 p-4 border-b border-gray-50";
        d.innerHTML = `<img src="${item.img}" class="w-16 h-16 rounded-lg object-cover"><div class="flex-1 overflow-hidden"><p class="text-[14px] font-bold line-clamp-2">${item.title}</p><p class="text-[10px] text-green-500 font-black mt-1">RECOMMENDED</p></div><div style="background:${theme}; color:${tCol}" class="w-11 h-11 rounded-full flex items-center justify-center text-[12px] font-black shrink-0">${item.btn}</div>`;
        body.appendChild(d);
      });
    }

    async function handleV3Upload(input, target) {
      if (!input.files || !input.files[0]) return;
      showLoading("影像壓縮與上傳中...");
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = async function() {
          const canvas = document.createElement('canvas');
          const maxW = 800; // 雷區 1 實作
          let w = img.width, h = img.height;
          if (w > maxW) { h = (maxW / w) * h; w = maxW; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

          try {
            const response = await fetch(CONFIG.WORKER_URL, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                licenseKey: CONFIG.LICENSE_KEY,
                action: "uploadImage",
                folderId: CONFIG.V3_FOLDER_ID,
                image: compressedBase64.split(',')[1]
              })
            });
            const res = await response.json();
            if (res.success) {
              if (target === 'hero') document.getElementById('v3-hero-url').value = res.url;
              else v3Items[target].img = res.url;
              showToast("✅ 已同步至雲端");
            } else throw new Error(res.error);
          } catch (err) {
            if (target === 'hero') document.getElementById('v3-hero-url').value = compressedBase64;
            else v3Items[target].img = compressedBase64; // 雷區 4 容錯
            showToast("⚠️ 已採 Base64 縮圖暫存");
          }
          hideLoading(); renderV3();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    }

    function addV3Item() { v3Items.push({ title: "新戰報項目", data: "new", img: "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=", btn: "查看", link: "" }); renderV3(); }
    function showLoading(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
    function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 3000); }
    function handleFile(input) { if (input.files && input.files[0]) { const r = new FileReader(); r.onload = (e) => { croppedBase64 = e.target.result; processWithAI(); }; r.readAsDataURL(input.files[0]); } }
    async function processWithAI() { showLoading("AI 辨識中..."); try { const res = await fetch(CONFIG.WORKER_URL, { method: "POST", body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "analyze", image: croppedBase64.split(',')[1] }) }); const r = await res.json(); hideLoading(); if (r.success) { const d = r.data; document.getElementById('res-name').value = d.name; document.getElementById('step-capture').classList.add('hidden'); document.getElementById('step-review').classList.remove('hidden'); } } catch (e) { hideLoading(); showToast("失敗"); } }
    window.onload = initLiff;
  </script>
</body>
</html>
