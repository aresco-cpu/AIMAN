<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ACT-BizCard 名片採集器</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

  <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative">
    <!-- Header -->
    <header class="p-6 border-b bg-white sticky top-0 z-20 shadow-sm">
      <h1 class="text-xl font-extrabold text-slate-800">ACT-BizCard <span class="text-blue-600">AI</span></h1>
      <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Business Card Collector v2.0</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 p-6 overflow-y-auto no-scrollbar pb-24">
      <div id="step-capture" class="space-y-6">
        <div class="aspect-[1.58/1] w-full border-4 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center bg-slate-50 relative overflow-hidden group">
          <input type="file" id="cameraInput" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer z-10" onchange="handleFile(this)">
          <div class="text-center group-hover:scale-110 transition-transform">
            <div class="text-4xl mb-2">📸</div>
            <p class="text-sm font-bold text-slate-500">拍攝名片或上傳照片</p>
          </div>
        </div>
      </div>

      <div id="step-crop" class="hidden fixed inset-0 z-50 bg-black flex flex-col">
        <div class="p-4 flex justify-between items-center bg-black/50 backdrop-blur text-white">
          <button onclick="cancelCrop()" class="px-4 py-2 font-bold text-sm">取消</button>
          <span class="font-bold">名片裁切</span>
          <button onclick="confirmCrop()" class="px-6 py-2 bg-blue-600 rounded-full font-bold text-sm shadow-lg">確認</button>
        </div>
        <div class="flex-1 relative bg-slate-900 overflow-hidden flex items-center justify-center">
          <img id="cropTarget" class="max-w-full">
        </div>
      </div>

      <div id="step-review" class="hidden space-y-6">
        <div class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase">姓名</label>
              <input type="text" id="res-name" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold">
            </div>
            <div>
              <label class="text-[10px] font-black text-slate-400 uppercase">電話</label>
              <input type="text" id="res-phone" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold">
            </div>
          </div>
          <div><label class="text-[10px] font-black text-slate-400 uppercase">公司</label><input type="text" id="res-company" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold"></div>
          <div><label class="text-[10px] font-black text-slate-400 uppercase">職稱</label><input type="text" id="res-title" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold"></div>
          <div><label class="text-[10px] font-black text-slate-400 uppercase">Email</label><input type="text" id="res-email" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold"></div>
          <div><label class="text-[10px] font-black text-slate-400 uppercase">地址</label><textarea id="res-address" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold h-20"></textarea></div>
        </div>
        <button onclick="saveCard()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black text-lg shadow-xl shadow-blue-200">確認數據並存檔</button>
      </div>
    </main>

    <div id="loading" class="hidden fixed inset-0 z-[100] bg-white/95 flex flex-col items-center justify-center p-10 text-center">
      <div class="loader rounded-full border-4 border-t-4 border-slate-200 h-16 w-16 mb-4"></div>
      <h3 class="text-lg font-black text-slate-800" id="loading-text">處理中...</h3>
    </div>
  </div>

  <script>
    // --- 這裡現在只需要填寫 Worker 網址 ---
    const CONFIG = {
      WORKER_URL: "https://super-snow-506c.ares-co2026.workers.dev/",
      LICENSE_KEY: "ARES-PRO-2024-KEY"
    };

    let cropper = null;
    let croppedBase64 = null;

    function handleFile(input) {
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('cropTarget').src = e.target.result;
          document.getElementById('step-crop').classList.remove('hidden');
          initCropper();
        };
        reader.readAsDataURL(input.files[0]);
      }
    }

    function initCropper() {
      if (cropper) cropper.destroy();
      const image = document.getElementById('cropTarget');
      cropper = new Cropper(image, { aspectRatio: 1.58 / 1, viewMode: 1 });
    }

    function cancelCrop() { document.getElementById('step-crop').classList.add('hidden'); }

    function confirmCrop() {
      const canvas = cropper.getCroppedCanvas({ width: 800 });
      croppedBase64 = canvas.toDataURL('image/jpeg', 0.85);
      document.getElementById('step-crop').classList.add('hidden');
      processWithAI();
    }

    // AI 辨識請求 (發給 Worker)
    async function processWithAI() {
      showLoading("AI 正在辨識中...");
      try {
        const response = await fetch(CONFIG.WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            licenseKey: CONFIG.LICENSE_KEY,
            action: "analyze",
            image: croppedBase64.split(',')[1]
          })
        });
        const result = await response.json();
        hideLoading();
        if (result.success) {
          fillData(result.data);
          document.getElementById('step-capture').classList.add('hidden');
          document.getElementById('step-review').classList.remove('hidden');
        } else {
          alert("辨識失敗：" + (result.error || "未知錯誤"));
        }
      } catch (err) {
        hideLoading();
        alert("連線 AI 伺服器失敗");
      }
    }

    function fillData(d) {
      document.getElementById('res-name').value = d.name || '';
      document.getElementById('res-company').value = d.company || '';
      document.getElementById('res-title').value = d.title || '';
      document.getElementById('res-phone').value = d.phone || '';
      document.getElementById('res-email').value = d.email || '';
      document.getElementById('res-address').value = d.address || '';
    }

    // 儲存數據請求 (統一發給 Worker 中轉)
    async function saveCard() {
      const cardData = {
        name: document.getElementById('res-name').value,
        company: document.getElementById('res-company').value,
        title: document.getElementById('res-title').value,
        phone: document.getElementById('res-phone').value,
        email: document.getElementById('res-email').value,
        address: document.getElementById('res-address').value,
        imgBase64: croppedBase64
      };
      showLoading("同步至戰情總表...");
      try {
        const response = await fetch(CONFIG.WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            licenseKey: CONFIG.LICENSE_KEY,
            action: "save",
            data: cardData
          })
        });
        const result = await response.json();
        hideLoading();
        if (result.success) {
          alert("✅ 資料已成功入庫！");
          location.reload();
        } else {
          alert("儲存失敗：" + result.error);
        }
      } catch (err) {
        hideLoading();
        alert("資料已發送，請至 Google Sheet 確認。");
        location.reload();
      }
    }

    function showLoading(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading').classList.remove('hidden'); }
    function hideLoading() { document.getElementById('loading').classList.add('hidden'); }
  </script>
</body>
</html>
