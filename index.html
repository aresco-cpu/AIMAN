<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ACT-BizCard 業務戰情中心</title>
  
  <!-- Tailwind CSS & DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Cropper.js & LIFF -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    /* 微調 Manus 感的漸層背景 */
    .manus-gradient {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .page-node { display: none; }
    .page-node.active { display: block; }
    
    /* 底部導覽列 (Mobile) */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #E2E8F0; height: 75px; display: flex; z-index: 60; padding-bottom: env(safe-area-inset-bottom); box-shadow: 0 -4px 6px -1px rgba(0,0,0,0.05); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; font-size: 11px; font-weight: 900; gap: 4px; transition: 0.2s; }
    .nav-btn svg { width: 24px; height: 24px; stroke-width: 2.5; }
    .nav-btn.active { color: #10b981; } /* DaisyUI Success Green */
    
    /* V3 編輯器佈局 (比例平衡優化) */
    .editor-container { 
      display: grid; 
      /* 左側380px，右側最大720px，防止無限拉長 */
      grid-template-columns: 380px minmax(0, 720px); 
      justify-content: center; 
      gap: 32px; 
      height: calc(100vh - 170px); 
    }
    .preview-pane { 
      background: #fff; 
      border: 1px solid #E2E8F0; 
      border-radius: 16px; 
      padding: 24px; 
      overflow-y: auto; 
      position: sticky; 
      top: 0; 
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); 
    }
    .form-pane { 
      background: #fff; 
      border: 1px solid #E2E8F0; 
      border-radius: 16px; 
      padding: 32px; 
      overflow-y: auto; 
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.08); 
    }
    
    /* 前台純淨模式 */
    body.is-preview { background: #f8fafc; }
    body.is-preview .bottom-nav, body.is-preview .navbar { display: none !important; }
    body.is-preview .main-view { padding: 0 !important; }

    @media (max-width: 1024px) {
      .editor-container { grid-template-columns: 1fr; height: auto; }
      .preview-pane { position: static; max-width: 480px; margin: 0 auto; width: 100%; }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans overflow-x-hidden">

  <!-- 全域頂部導覽列 (Manus Gradient) -->
  <div class="navbar manus-gradient text-white shadow-lg px-4 md:px-6 sticky top-0 z-40">
    <div class="flex-1">
      <a class="text-xl font-black tracking-tighter cursor-pointer" onclick="showPage('home')">WoWa<span class="text-green-400">Link</span></a>
    </div>
    <div class="flex-none gap-3">
      <!-- 狀態標籤 (PC 顯示) -->
      <div class="hidden md:flex badge badge-success font-bold text-white border-none shadow-sm">AI 診斷已就緒</div>
      
      <!-- 視角切換按鈕 (僅 Admin 可見) -->
      <button id="view-toggle-btn" onclick="toggleViewMode()" class="hidden btn btn-sm btn-warning text-yellow-900 rounded-full font-black shadow-md border-none">後台模式</button>
      
      <!-- 用戶頭貼 -->
      <div class="dropdown dropdown-end">
        <label tabindex="0" class="btn btn-ghost btn-circle avatar border-2 border-white/20">
          <div class="w-10 rounded-full">
            <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=" id="user-avatar" class="object-cover" />
          </div>
        </label>
      </div>
    </div>
  </div>

  <!-- 主視圖區域 -->
  <main class="main-view pb-24 md:pb-10 pt-6">
    <div class="container mx-auto px-4 lg:px-8 max-w-7xl">
      
      <!-- 1. 首頁儀表板 -->
      <div id="page-home" class="page-node active space-y-6">
        <div class="card bg-white shadow-xl border border-slate-200">
          <div class="card-body">
            <h2 class="card-title text-2xl font-black text-slate-800">您好，<span id="welcome-name" class="text-green-500">使用者</span></h2>
            <p class="text-slate-500 text-sm font-medium">系統授權與雲端相片庫連線狀態：<span class="text-success font-bold">正常</span></p>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div class="card bg-white shadow-xl border border-slate-200">
            <div class="card-body items-center text-center">
              <h2 class="card-title text-xs font-black text-slate-400 uppercase tracking-widest">當月採集量</h2>
              <p class="text-6xl font-black text-slate-800 my-2">382</p>
            </div>
          </div>
          <div onclick="showPage('scanner')" class="card bg-white shadow-xl border border-slate-200 cursor-pointer hover:-translate-y-1 hover:border-green-500 transition-all group">
            <div class="card-body items-center text-center">
              <div class="text-5xl mb-2 group-hover:scale-110 transition-transform">📸</div>
              <h2 class="card-title text-slate-800">名片掃描</h2>
              <p class="text-xs text-slate-500">AI OCR 自動辨識</p>
            </div>
          </div>
          <div onclick="showPage('editor')" class="card bg-white shadow-xl border border-slate-200 cursor-pointer hover:-translate-y-1 hover:border-green-500 transition-all group">
            <div class="card-body items-center text-center">
              <div class="text-5xl mb-2 group-hover:scale-110 transition-transform">🎨</div>
              <h2 class="card-title text-slate-800">V3 戰報編輯</h2>
              <p class="text-xs text-slate-500">Flex Message 發布</p>
            </div>
          </div>
        </div>
      </div>

      <!-- 2. AI 掃描器 -->
      <div id="page-scanner" class="page-node max-w-2xl mx-auto">
        <div id="step-capture" class="card bg-white shadow-xl border border-slate-200">
          <div class="card-body items-center text-center p-12">
            <div class="aspect-[1.58/1] w-full border-4 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center bg-slate-50 relative overflow-hidden hover:bg-slate-100 transition-colors">
              <input type="file" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 z-10 cursor-pointer" onchange="handleFile(this)">
              <span class="text-6xl mb-4">📸</span>
              <p class="font-black text-slate-500 tracking-widest uppercase">拍攝或上傳名片</p>
            </div>
          </div>
        </div>
        <div id="step-review" class="hidden card bg-white shadow-xl border border-slate-200 mt-6 animate-in slide-in-from-bottom">
          <div class="card-body">
            <h2 class="card-title mb-4">確認名片數據</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="form-control w-full">
                <label class="label"><span class="label-text font-bold text-slate-500">姓名</span></label>
                <input type="text" id="res-name" class="input input-bordered w-full" />
              </div>
              <div class="form-control w-full">
                <label class="label"><span class="label-text font-bold text-slate-500">電話</span></label>
                <input type="text" id="res-phone" class="input input-bordered w-full" />
              </div>
              <div class="form-control w-full md:col-span-2">
                <label class="label"><span class="label-text font-bold text-slate-500">公司名稱</span></label>
                <input type="text" id="res-company" class="input input-bordered w-full" />
              </div>
            </div>
            <div class="card-actions justify-end mt-6">
              <button onclick="saveCard()" class="btn btn-success text-white px-8 shadow-lg w-full md:w-auto">確認入庫</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 3. V3 編輯器 (比例優化對齊版) -->
      <div id="page-editor" class="page-node">
        <!-- 容器置中並限制最大寬度，對齊下方的 Grid -->
        <div class="max-w-[1132px] mx-auto">
          
          <!-- 標題與按鈕區塊 -->
          <div class="flex items-center justify-between mb-6 pb-4 border-b border-slate-200">
            <div>
              <h2 class="text-2xl font-black text-slate-800">V3 戰報模板編輯器</h2>
              <p class="text-xs text-slate-400 font-bold mt-1 uppercase tracking-widest">Image Storage: Google Drive Linked</p>
            </div>
            <button onclick="saveV3Content()" class="btn btn-success text-white px-8 shadow-lg border-none hover:scale-105 transition-transform">發布變更</button>
          </div>

          <!-- 編輯與預覽雙欄佈局 -->
          <div class="editor-container">
            
            <!-- 左側：手機預覽 (寬度 380px) -->
            <div class="preview-pane no-scrollbar">
              <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 text-center">Mobile Live Preview</p>
              
              <!-- 模擬對話框外觀 -->
              <div class="mock-bubble">
                 <img id="v3-mock-hero" src="" class="w-full aspect-[12/5] object-cover bg-slate-100" />
                 <div id="v3-mock-body" class="bg-white"></div>
              </div>
            </div>

            <!-- 右側：編輯表單 (最大寬度 720px) -->
            <div class="form-pane no-scrollbar space-y-8">
              
              <!-- 區塊 1: 品牌主視覺 -->
              <div>
                <h4 class="font-black text-slate-700 text-lg mb-4 flex items-center gap-2">
                  <span class="w-1.5 h-5 bg-green-500 rounded-full inline-block"></span>1. 品牌主視覺
                </h4>
                <div class="bg-slate-50 p-6 rounded-xl border border-slate-100">
                  <div class="form-control w-full mb-4">
                    <label class="label px-0 pt-0"><span class="label-text font-bold text-slate-600 uppercase">頂部主圖 URL</span></label>
                    <div class="flex gap-2">
                      <input type="text" id="v3-hero-url" placeholder="網址或點擊右側上傳..." class="input input-sm input-bordered w-full focus:border-green-500 bg-white" oninput="updatePreview()">
                      <button onclick="document.getElementById('hero-file').click()" class="btn btn-sm btn-neutral shrink-0 px-4">📸 上傳</button>
                      <input type="file" id="hero-file" class="hidden" accept="image/*" onchange="handleV3Upload(this, 'hero')">
                    </div>
                  </div>
                  <div class="grid grid-cols-2 gap-6">
                    <div class="form-control w-full">
                      <label class="label px-0 pt-0"><span class="label-text font-bold text-slate-600 uppercase">主題顏色</span></label>
                      <input type="color" id="v3-theme-color" value="#E91E63" class="w-full h-10 cursor-pointer rounded-lg border border-slate-200 p-1 bg-white" oninput="updatePreview()">
                    </div>
                    <div class="form-control w-full">
                      <label class="label px-0 pt-0"><span class="label-text font-bold text-slate-600 uppercase">文字顏色</span></label>
                      <input type="color" id="v3-text-color" value="#ffffff" class="w-full h-10 cursor-pointer rounded-lg border border-slate-200 p-1 bg-white" oninput="updatePreview()">
                    </div>
                  </div>
                </div>
              </div>

              <!-- 區塊 2: 內容清單 -->
              <div>
                <div class="flex items-center justify-between mb-4">
                  <h4 class="font-black text-slate-700 text-lg flex items-center gap-2">
                    <span class="w-1.5 h-5 bg-green-500 rounded-full inline-block"></span>2. 內容清單
                  </h4>
                  <button onclick="addV3Item()" class="btn btn-outline btn-success btn-sm rounded-full bg-white">+ 新增欄位</button>
                </div>
                <div id="v3-items-list" class="space-y-4"></div>
              </div>

            </div>
          </div>
        </div>
      </div>

      <!-- 4. 手機純淨前台預覽 (Mobile Preview Page) -->
      <div id="page-user-preview" class="page-node max-w-[380px] mx-auto pt-6 pb-10">
          <div class="text-center mb-6">
            <span class="badge badge-outline badge-lg font-black text-slate-500 uppercase tracking-widest border-2">Mobile Preview</span>
          </div>
          <div style="width: 320px; height: 620px;" class="mx-auto border-[8px] border-slate-800 rounded-[3rem] shadow-2xl overflow-hidden bg-[#93A3B8] relative">
            <div class="w-full h-6 bg-slate-800 flex justify-center items-end pb-1 z-20 relative">
              <div class="w-20 h-4 bg-black rounded-full"></div>
            </div>
            <div class="p-3 space-y-4 h-[calc(100%-24px)] overflow-y-auto no-scrollbar pb-20">
              <div class="chat chat-start mt-2">
                <div class="chat-bubble bg-white text-slate-800 text-xs shadow-sm font-bold">您好！這是您的專屬資訊：</div>
              </div>
              <div class="rounded-2xl overflow-hidden shadow-lg bg-white border border-slate-100">
                 <img id="v3-user-hero" src="" class="w-full aspect-[12/5] object-cover bg-slate-100" />
                 <div id="v3-user-body" class="bg-white"></div>
              </div>
            </div>
          </div>
          <div class="mt-10 text-center">
              <button onclick="toggleViewMode()" class="btn btn-neutral rounded-full px-12 shadow-xl uppercase tracking-widest font-black">返回後台</button>
          </div>
      </div>

    </div>
  </main>

  <!-- 底部導覽列 (Mobile) -->
  <nav id="bottom-nav" class="bottom-nav md:hidden">
    <div onclick="showToast('核銷')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4m-2 12v4a2 2 0 01-2 2H4a2 2 0 01-2-2V4a2 2 0 012-2h11" stroke-linecap="round"/></svg><span>核銷</span></div>
    <div onclick="showPage('scanner')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8" stroke-linecap="round"/></svg><span>建立</span></div>
    <div onclick="showToast('CRM')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>CRM</span></div>
    <div id="btn-match" onclick="showPage('editor')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9.5 14.5L12 12m0 0l2.5-2.5M12 12l2.5 2.5M12 12l-2.5-2.5M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9z" stroke-linecap="round"/></svg><span>編輯</span></div>
    <div onclick="showToast('名片')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><span>名片</span></div>
    <div onclick="showPage('home')" class="nav-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33"/></svg><span>首頁</span></div>
  </nav>

  <!-- 全域載入動畫 & Toast -->
  <div id="loading" class="hidden fixed inset-0 z-[100] bg-white/90 flex flex-col items-center justify-center">
    <span class="loading loading-spinner loading-lg text-green-500"></span>
    <p id="loading-text" class="mt-4 font-black text-slate-700 tracking-widest uppercase">處理中...</p>
  </div>
  <div id="toast"></div>

  <script>
    const CONFIG = {
      LIFF_ID: "2009367829-zVxIwsKl",
      WORKER_URL: "https://super-snow-506c.ares-co2026.workers.dev/",
      LICENSE_KEY: "ARES-PRO-2024-KEY",
      V3_FOLDER_ID: "1ZXxjxglQqPpaLGV5tq4iIjqLqrfD7Zw1"
    };

    const DUMMY_IMG = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=";
    let currentEmpName = "管理員", isPreviewMode = false, croppedBase64 = null;
    
    let v3Items = [
      { title: "請輸入資訊標題...", data: "news_01", img: DUMMY_IMG, btn: "查看", link: "" }
    ];

    // --- 初始化 ---
    async function initLiff() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID });
        if (!liff.isLoggedIn()) liff.login();
        else {
          const p = await liff.getProfile();
          const uid = liff.getContext().userId;
          currentEmpName = p.displayName;
          const isAdmin = (uid === CONFIG.ADMIN_UID);
          
          document.getElementById('welcome-name').innerText = currentEmpName;
          document.getElementById('user-avatar').src = p.pictureUrl;
          
          if(isAdmin) {
             const vBtn = document.getElementById('view-toggle-btn');
             if(vBtn) vBtn.classList.remove('hidden');
          }
        }
      } catch (e) { 
        console.warn("Liff 未載入 - 開發模式"); 
        const vBtn = document.getElementById('view-toggle-btn');
        if(vBtn) vBtn.classList.remove('hidden');
      }
      
      await loadV3Data();
    }

    // --- 資料讀取與畫面切換 ---
    async function loadV3Data() {
      showLoading("載入戰報設定中...");
      try {
        const response = await fetch(CONFIG.WORKER_URL, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "loadV3" })
        });
        const res = await response.json();
        if (res.success && res.data) {
          document.getElementById('v3-hero-url').value = res.data.hero || '';
          document.getElementById('v3-theme-color').value = res.data.theme || '#E91E63';
          document.getElementById('v3-text-color').value = res.data.text || '#ffffff';
          if (res.data.items && res.data.items.length > 0) v3Items = res.data.items;
        }
      } catch(e) {}
      hideLoading();
      renderEditorList();
    }

    window.toggleViewMode = function() { 
      isPreviewMode = !isPreviewMode; 
      document.body.classList.toggle('is-preview', isPreviewMode);
      
      const vBtn = document.getElementById('view-toggle-btn');
      if(vBtn) {
        vBtn.innerText = isPreviewMode ? "返回後台" : "前台預覽";
        vBtn.className = isPreviewMode ? "btn btn-sm btn-neutral rounded-full font-black shadow-md border-none" : "btn btn-sm btn-warning text-yellow-900 rounded-full font-black shadow-md border-none";
      }
      showPage(isPreviewMode ? 'user-preview' : 'home');
    };

    window.showPage = function(pId) {
      document.querySelectorAll('.page-node').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + pId).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      
      // 更新底部導覽列狀態
      if(pId === 'home') document.querySelectorAll('.nav-btn')[5].classList.add('active');
      if(pId === 'scanner') document.querySelectorAll('.nav-btn')[1].classList.add('active');
      if(pId === 'editor') document.querySelectorAll('.nav-btn')[3].classList.add('active');

      if (pId === 'user-preview' || pId === 'editor') updatePreview();
    };

    window.showLoading = function(t) { document.getElementById('loading-text').innerText = t; document.getElementById('loading').classList.remove('hidden'); };
    window.hideLoading = function() { document.getElementById('loading').classList.add('hidden'); };
    window.showToast = function(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 3000); };

    // --- V3 編輯與預覽 ---
    window.updateItemData = function(idx, field, value) {
      v3Items[idx][field] = value;
      updatePreview();
    };

    window.updatePreview = function() {
      const theme = document.getElementById('v3-theme-color').value;
      const tCol = document.getElementById('v3-text-color').value;
      const heroUrl = document.getElementById('v3-hero-url').value || DUMMY_IMG;
      
      document.getElementById('v3-mock-hero').src = heroUrl;
      document.getElementById('v3-user-hero').src = heroUrl;

      let itemsHtml = '';
      v3Items.forEach((item, idx) => {
        const thumb = document.getElementById(`thumb-img-${idx}`);
        if(thumb) thumb.src = item.img || DUMMY_IMG;

        const linkHref = item.link ? `href="${item.link}" target="_blank"` : `href="javascript:void(0)" onclick="showToast('尚未設定連結')"`;

        itemsHtml += `
          <div class="flex items-center gap-4 p-4 border-b border-slate-100 bg-white">
            <a ${linkHref} class="shrink-0 block hover:opacity-80 transition-opacity no-underline">
              <img src="${item.img || DUMMY_IMG}" class="w-16 h-16 rounded-xl object-cover border border-slate-200 shadow-sm">
            </a>
            <div class="flex-1 overflow-hidden">
              <p class="text-sm font-bold text-slate-800 line-clamp-2 leading-tight">${item.title || '請輸入標題...'}</p>
              <p class="text-[10px] text-green-500 font-black mt-1 uppercase tracking-wider">RECOMMENDED</p>
            </div>
            <a ${linkHref} style="background:${theme}; color:${tCol}" class="w-12 h-12 rounded-full flex items-center justify-center text-[12px] font-black shrink-0 shadow-md hover:opacity-90 hover:scale-105 transition-all no-underline">
              ${item.btn || '查看'}
            </a>
          </div>
        `;
      });

      document.getElementById('v3-mock-body').innerHTML = itemsHtml;
      document.getElementById('v3-user-body').innerHTML = itemsHtml;
    };

    window.renderEditorList = function() {
      const container = document.getElementById('v3-items-list');
      container.innerHTML = ''; 

      v3Items.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = "bg-white border border-slate-200 rounded-2xl p-5 flex gap-5 relative shadow-sm";
        div.innerHTML = `
          <div class="w-24 h-24 bg-slate-50 border border-slate-200 rounded-xl relative overflow-hidden shrink-0 group cursor-pointer shadow-inner" onclick="document.getElementById('file-${idx}').click()">
            <img id="thumb-img-${idx}" src="${item.img || DUMMY_IMG}" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
              <span class="text-xs text-white font-bold tracking-widest uppercase">更換</span>
            </div>
            <input type="file" id="file-${idx}" class="hidden" accept="image/*" onchange="handleV3Upload(this, ${idx})">
          </div>
          <div class="flex-1 flex flex-col gap-3">
            <input type="text" value="${item.title}" placeholder="資訊標題..." class="input input-sm input-bordered w-full font-bold text-slate-700 bg-white focus:border-green-500" oninput="updateItemData(${idx}, 'title', this.value)">
            <input type="text" value="${item.link}" placeholder="點擊跳轉網址 (https://...)" class="input input-sm input-bordered w-full font-mono text-blue-600 bg-white focus:border-green-500" oninput="updateItemData(${idx}, 'link', this.value)">
            <div class="grid grid-cols-2 gap-3">
              <input type="text" value="${item.data}" placeholder="追蹤 ID" class="input input-sm input-bordered w-full bg-slate-50 focus:border-green-500" oninput="updateItemData(${idx}, 'data', this.value)">
              <input type="text" value="${item.btn}" placeholder="按鈕文字" class="input input-sm input-bordered w-full font-bold bg-white focus:border-green-500" oninput="updateItemData(${idx}, 'btn', this.value)">
            </div>
          </div>
          <button onclick="removeV3Item(${idx})" class="btn btn-circle btn-xs absolute -top-3 -right-3 bg-white border border-slate-200 text-slate-400 hover:text-red-500 hover:bg-red-50 hover:border-red-200 shadow-md">✕</button>
        `;
        container.appendChild(div);
      });
      updatePreview();
    };

    window.addV3Item = function() { 
      if (v3Items.length >= 8) return showToast("最多 8 筆資料");
      v3Items.push({ title: "", data: "item_" + Date.now(), img: DUMMY_IMG, btn: "查看", link: "" }); 
      renderEditorList(); 
    };

    window.removeV3Item = function(idx) {
      v3Items.splice(idx, 1);
      renderEditorList(); 
    };

    // --- 圖片上傳 ---
    window.handleV3Upload = async function(input, target) {
      if (!input.files || !input.files[0]) return;
      showLoading("壓縮與雲端傳輸中...");
      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = async function() {
          const canvas = document.createElement('canvas');
          const maxW = 800; 
          let w = img.width, h = img.height;
          if (w > maxW) { h = (maxW / w) * h; w = maxW; }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

          try {
            const response = await fetch(CONFIG.WORKER_URL, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "uploadImage", folderId: CONFIG.V3_FOLDER_ID, image: compressedBase64.split(',')[1] })
            });
            const res = await response.json();
            if (res.success) {
              if (target === 'hero') document.getElementById('v3-hero-url').value = res.url;
              else v3Items[target].img = res.url;
              showToast("✅ 已同步至雲端相片庫");
            } else throw new Error(res.error);
          } catch (err) {
            if (target === 'hero') document.getElementById('v3-hero-url').value = compressedBase64;
            else v3Items[target].img = compressedBase64;
            showToast("⚠️ 上傳失敗，改採 Base64 暫存模式");
          }
          hideLoading(); updatePreview();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(input.files[0]);
    };

    window.saveV3Content = async function() {
      const data = { hero: document.getElementById('v3-hero-url').value, theme: document.getElementById('v3-theme-color').value, text: document.getElementById('v3-text-color').value, items: v3Items };
      showLoading("同步至戰情總表...");
      try {
        const res = await fetch(CONFIG.WORKER_URL, {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "saveV3", empName: currentEmpName, data: data })
        });
        const r = await res.json();
        hideLoading();
        if (r.success) { showToast("✅ 發布成功！"); showPage('home'); }
        else showToast("❌ 發布失敗：" + r.error);
      } catch (e) { hideLoading(); showToast("網路連線異常"); }
    };

    // --- 名片 AI 掃描 ---
    window.handleFile = function(input) { 
      if (input.files && input.files[0]) { 
        const r = new FileReader(); 
        r.onload = (e) => { croppedBase64 = e.target.result; processWithAI(); }; 
        r.readAsDataURL(input.files[0]); 
      } 
    };

    window.processWithAI = async function() { 
      showLoading("GPT-4o 辨識中..."); 
      try { 
        const res = await fetch(CONFIG.WORKER_URL, { 
          method: "POST", headers: { "Content-Type": "application/json" }, 
          body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "analyze", image: croppedBase64.split(',')[1] }) 
        }); 
        const r = await res.json(); 
        hideLoading(); 
        if (r.success) { 
          document.getElementById('res-name').value = r.data.name || ''; 
          document.getElementById('res-phone').value = r.data.phone || ''; 
          document.getElementById('res-company').value = r.data.company || ''; 
          document.getElementById('step-capture').classList.add('hidden'); 
          document.getElementById('step-review').classList.remove('hidden'); 
        } 
      } catch (e) { hideLoading(); showToast("辨識失敗"); } 
    };

    window.saveCard = async function() { 
      const data = { name: document.getElementById('res-name').value, company: document.getElementById('res-company').value, phone: document.getElementById('res-phone').value, imgBase64: croppedBase64 }; 
      showLoading("資料入庫中..."); 
      try { 
        await fetch(CONFIG.WORKER_URL, { 
          method: "POST", headers: { "Content-Type": "application/json" }, 
          body: JSON.stringify({ licenseKey: CONFIG.LICENSE_KEY, action: "save", empName: currentEmpName, data: data }) 
        }); 
        hideLoading(); showToast("✅ 入庫成功"); location.reload(); 
      } catch (e) { hideLoading(); showToast("寫入失敗"); } 
    };

    window.onload = initLiff;
  </script>
</body>
</html>
